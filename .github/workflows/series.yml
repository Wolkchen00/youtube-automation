name: Series Daily

# Çok part'lı dizilerin günlük üretim + 3 platforma (upload-post) yayını.
# Her çalıştırma her aktif serinin SIRADAKİ part'ını üretir ve yayınlar.

on:
  schedule:
    - cron: '30 14 * * *'   # 14:30 UTC ≈ 07:30 California (PDT)
  workflow_dispatch:
    inputs:
      series:
        description: "Seri slug (boş = tüm aktif seriler)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  produce-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install FFmpeg
        # fonts-dejavu-core: CCTV timestamp/caption overlay'leri (drawtext) için
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg fonts-dejavu-core

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          KIE_AI_API_KEY=${{ secrets.KIE_AI_API_KEY }}
          IMGBB_API_KEY=${{ secrets.IMGBB_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          UPLOAD_POST_API_KEY=${{ secrets.UPLOAD_POST_API_KEY }}
          SENTINAL_FACE_REF=${{ secrets.SENTINAL_FACE_REF }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF

      - name: Prepare dirs
        run: mkdir -p logs output

      - name: Produce + (onay bildirimi / otomatik yayın)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARG=""
          if [ -n "${{ github.event.inputs.series }}" ]; then ARG="--series ${{ github.event.inputs.series }}"; fi
          python -X utf8 -m series.series_runner $ARG 2>&1 | tee logs/series_run.log

      - name: Persist series state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main || true
            git add series_data/ || true
            git diff --cached --quiet && echo "Değişiklik yok" && break
            git commit -m "chore: seri durumunu ilerlet [skip ci]" || true
            git push origin main && break || (echo "push denemesi $i başarısız, 10s bekle..." && sleep 10)
          done

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: series-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
