name: Time Witness Daily

# 'I Woke Up In History' (time-witness) GARANTİLİ günlük şeridi — sentinalihsandaily kanalının
# YENİ korku-DIŞI ana serisi (İhsan kararı 2026-07-07: "korku olmasın, bambaşka seri, en çok
# tıklanan/aranan tarz"). Birinci-şahıs tarih POV antolojisi: İhsan her bölüm başka bir gerçek
# tarihsel anda uyanır. Ana kuyruktan (series.yml / run_all günde-1 tavanı) BAĞIMSIZ çalışır:
# her gün sıradaki bölümü üretir + 3 platforma (YT/IG/TikTok) yayınlar. Çifte üretim olmasın diye
# time-witness series.json'da priority=999. Eski night-archive.yml şeridi (aynı 18:30 slotu)
# paused edildiği için devre dışıdır → yarış yok.

on:
  # 2026-07-12: PAUSED — İhsan kararı: "sadece tarih anlatıyor, etkileşim yok" → sentinalihsandaily
  # kanalı could-you-survive ('Could You Survive', hayatta-kalma karar POV'u) serisine devredildi;
  # günlük cron devre dışı (18:30 slotu could-you-survive.yml'da). time-witness geri istenirse
  # aşağıdaki schedule'ı aç + could-you-survive.yml schedule'ını kapat + iki series.json'daki
  # status'ları takasla (tek kanal = tek aktif seri, günde-1 kilidi).
  # schedule:
  #   - cron: '30 18 * * *'   # 18:30 UTC ≈ 11:30 California ≈ 21:30 TR
  workflow_dispatch:

permissions:
  contents: write

jobs:
  produce-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg fonts-dejavu-core

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          KIE_AI_API_KEY=${{ secrets.KIE_AI_API_KEY }}
          IMGBB_API_KEY=${{ secrets.IMGBB_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          UPLOAD_POST_API_KEY=${{ secrets.UPLOAD_POST_API_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF

      - name: Prepare dirs
        run: mkdir -p logs output

      - name: Oto-ikmal (kuyruk azaldıysa Gemini yeni tarih bölümleri yazar — kredi harcamaz)
        run: python -X utf8 -m series.replenish --series time-witness 2>&1 | tee logs/time_witness_replenish.log

      - name: Produce + publish (Time Witness sıradaki bölüm)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -X utf8 -m series.series_runner --series time-witness 2>&1 | tee logs/time_witness_run.log

      - name: Persist series state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main || true
            git add series_data/ || true
            git add sentinal_ihsan/ || true
            git add aimagine/ || true
            git add galactic_experience/ || true
            git add shadowedhistory/ || true
            git diff --cached --quiet && echo "Değişiklik yok" && break
            git commit -m "chore: time-witness durumunu ilerlet [skip ci]" || true
            git push origin main && break || (echo "push denemesi $i başarısız, 10s bekle..." && sleep 10)
          done

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: time-witness-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
