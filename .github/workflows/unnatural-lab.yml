name: Unnatural Lab Daily

# 'Unnatural Lab' GARANTİLİ günlük şeridi — sentinalihsandaily kanalının YENİ ana serisi.
#
# İhsan kararı 2026-07-20: ABSÜRT-OBJE / DENEY formatına DÖNÜŞ. Gerekçe (canlı YouTube API
# ölçümü, 148 video): absürt-obje n=105 medyan 788 izlenme / medyan 31 sn; tarihsel
# hayatta-kalma (could-you-survive) n=12 medyan 15.5 izlenme / medyan 49 sn, 12 videoda
# TOPLAM 1 yorum, iki günde 0 abone. Belirleyici sinyal SÜRE: 14-41 sn bandı 1.000-3.355
# izlenme, 47-53 sn bandı 4-71 izlenme → yeni seri 4 çekim × 6 sn = 24 saniyeye SABİTLENDİ.
#
# Format: SESSİZ (anlatım yok, tek ses müzik), ön kamera POV, 4 sahne SETUP→ACTION→PROGRESS→REVEAL.
# Eski (2026-06-14 öncesi) pipeline'ın reçetesi yeni series/ motoruna taşındı.
#
# Ana kuyruktan (series.yml / run_all günde-1 tavanı) BAĞIMSIZ çalışır. Çifte üretim olmasın
# diye unnatural-lab series.json'da priority=999. Eski could-you-survive.yml şeridi (aynı 18:30
# slotu) paused edildiği için devre dışıdır → yarış yok. Critic-QC bible'da AÇIK.
# Saat düzeni: ana koşu 14:30 UTC → planetfall 16:30 UTC → bu koşu 18:30 UTC → drowned 20:30 UTC.
#
# ⚠️ İLK KOŞULAR ONAYLI: series.json publish_mode="approval" → video üretilir, GitHub Release'e
# yüklenir, Telegram'a önizleme kareleriyle "yayınlansın mı?" sorusu gider; ONAY GELMEDEN
# hiçbir platforma yayınlanmaz. Format kanıtlandıktan sonra publish_mode="auto" yapılır.

on:
  schedule:
    - cron: '30 18 * * *'   # 18:30 UTC ≈ 11:30 California ≈ 21:30 TR
  workflow_dispatch:

permissions:
  contents: write

jobs:
  produce-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg fonts-dejavu-core

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          KIE_AI_API_KEY=${{ secrets.KIE_AI_API_KEY }}
          IMGBB_API_KEY=${{ secrets.IMGBB_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          UPLOAD_POST_API_KEY=${{ secrets.UPLOAD_POST_API_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF

      - name: Prepare dirs
        run: mkdir -p logs output

      - name: Oto-ikmal (kuyruk azaldıysa Gemini yeni obje/deney bölümleri yazar — kredi harcamaz)
        run: python -X utf8 -m series.replenish --series unnatural-lab 2>&1 | tee logs/unnatural_lab_replenish.log

      - name: Produce + publish (Unnatural Lab sıradaki bölüm)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -X utf8 -m series.series_runner --series unnatural-lab 2>&1 | tee logs/unnatural_lab_run.log

      - name: Persist series state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main || true
            git add series_data/ || true
            git add sentinal_ihsan/ || true
            git add aimagine/ || true
            git add galactic_experience/ || true
            git add shadowedhistory/ || true
            git diff --cached --quiet && echo "Değişiklik yok" && break
            git commit -m "chore: unnatural-lab durumunu ilerlet [skip ci]" || true
            git push origin main && break || (echo "push denemesi $i başarısız, 10s bekle..." && sleep 10)
          done

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unnatural-lab-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
