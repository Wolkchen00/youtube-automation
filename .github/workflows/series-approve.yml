name: Series Approve

# Telegram'dan gelen ✅/❌ onayını yoklar; onaylanan part'ı 3 platforma yayınlar.
# Repo public → Actions dakikaları ücretsiz, sık yoklama sorun değil.

on:
  # Telegram ONAY sistemi KALDIRILDI (İhsan kararı) — tüm seriler artık publish_mode=auto
  # ile direkt yayınlanıyor. Cron kapalı; gerekirse elle (workflow_dispatch) çalıştırılabilir.
  # schedule:
  #   - cron: '*/10 * * * *'   # her 10 dakikada bir
  workflow_dispatch:
    inputs:
      series:
        description: "Seri slug (boş = tüm aktif)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: series-approve
  cancel-in-progress: false

jobs:
  approve-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          UPLOAD_POST_API_KEY=${{ secrets.UPLOAD_POST_API_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF

      - name: Prepare dirs
        run: mkdir -p logs output

      - name: Check approvals + publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARG=""
          if [ -n "${{ github.event.inputs.series }}" ]; then ARG="--series ${{ github.event.inputs.series }}"; fi
          python -X utf8 -m series.approver $ARG 2>&1 | tee logs/series_approve.log

      - name: Persist state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main || true
            git add series_data/ || true
            git add sentinal_ihsan/ || true
            git add aimagine/ || true
            git add galactic_experience/ || true
            git add shadowedhistory/ || true
            git diff --cached --quiet && echo "Değişiklik yok" && break
            git commit -m "chore: onay durumu güncelle [skip ci]" || true
            git push origin main && break || (echo "push denemesi $i başarısız, 10s bekle..." && sleep 10)
          done
