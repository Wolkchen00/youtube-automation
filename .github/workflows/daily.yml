name: YouTube Daily Automation

on:
  schedule:
    # Her gün UTC 16:00 = California 09:00 AM (PDT, UTC-7)
    - cron: '0 16 * * *'
  workflow_dispatch:  # Manuel tetikleme butonu

jobs:
  # ─── Shared setup: checkout + persist history ─────────────────────────────────
  shadowedhistory:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          cat > .env << EOF
          KIE_AI_API_KEY=${{ secrets.KIE_AI_API_KEY }}
          IMGBB_API_KEY=${{ secrets.IMGBB_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          UPLOAD_POST_API_KEY=${{ secrets.UPLOAD_POST_API_KEY }}
          SENTINAL_FACE_REF=${{ secrets.SENTINAL_FACE_REF }}
          UPLOAD_USER_AIMAGINE=${{ secrets.UPLOAD_USER_AIMAGINE }}
          UPLOAD_USER_SHADOWEDHISTORY=${{ secrets.UPLOAD_USER_SHADOWEDHISTORY }}
          UPLOAD_USER_GALACTIC=${{ secrets.UPLOAD_USER_GALACTIC }}
          UPLOAD_USER_SENTINAL=${{ secrets.UPLOAD_USER_SENTINAL }}
          EOF

      - name: Create output directories
        run: |
          mkdir -p output/{shadowedhistory,sentinal_ihsan,galactic_experiment,aimagine}/{frames,clips,final}
          mkdir -p logs

      - name: Run shadowedhistory
        run: python -X utf8 daily_runner.py --channels shadowedhistory 2>&1 | tee logs/shadowedhistory_run.log

      - name: Persist topic history
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add logs/*_history.json || true
          git commit -m "chore: update topic history [skip ci]" || true
          git push origin main || true

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-shadowedhistory-${{ github.run_number }}
          path: logs/
          retention-days: 7

