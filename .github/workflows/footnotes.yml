name: Footnotes Daily

# 'Footnotes of History' — shadowedhistory kanalının YENİ ana şeridi (İhsan kararı
# 2026-07-13: the__footnote formatının tam kopyası → kanala entegre). Her bölüm
# tarihin az bilinen ama belgelenmiş TEK GERÇEK anını yeniden kurar: video sessiz
# sinematik dönem-daldırma (başta 'City, YEAR' kartı + crossfade geçişler + bölüme
# özgü Suno duygusal skoru TEK ses), hikâye YAZILI caption'da (YT açıklaması +
# IG/TikTok caption). Ana kuyruktan (series.yml / run_all günde-1 tavanı) BAĞIMSIZ
# çalışır; priority=999 ile ana kuyruğun fiilen dışında. Eski drowned-history.yml
# şeridi (aynı 20:30 slotu) paused edildiği için devre dışıdır → yarış yok.
# Şerit merdiveni: 14:30 ana → 16:30 planetfall → 18:30 could-you-survive → 20:30 bu.

on:
  schedule:
    - cron: '30 20 * * *'   # 20:30 UTC ≈ 13:30 California ≈ 23:30 TR
  workflow_dispatch:

permissions:
  contents: write

jobs:
  produce-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install FFmpeg
        # fonts-dejavu-core: title_card / fact_captions drawtext bindirmeleri için
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg fonts-dejavu-core

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          KIE_AI_API_KEY=${{ secrets.KIE_AI_API_KEY }}
          IMGBB_API_KEY=${{ secrets.IMGBB_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          UPLOAD_POST_API_KEY=${{ secrets.UPLOAD_POST_API_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF

      - name: Prepare dirs
        run: mkdir -p logs output

      - name: Oto-ikmal (kuyruk azaldıysa Gemini yeni 'footnote' anları yazar — kredi harcamaz)
        run: python -X utf8 -m series.replenish --series footnotes 2>&1 | tee logs/footnotes_replenish.log

      - name: Produce + publish (Footnotes sıradaki bölüm)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -X utf8 -m series.series_runner --series footnotes 2>&1 | tee logs/footnotes_run.log

      - name: Persist series state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main || true
            git add series_data/ || true
            git add sentinal_ihsan/ || true
            git add aimagine/ || true
            git add galactic_experience/ || true
            git add shadowedhistory/ || true
            git diff --cached --quiet && echo "Değişiklik yok" && break
            git commit -m "chore: footnotes durumunu ilerlet [skip ci]" || true
            git push origin main && break || (echo "push denemesi $i başarısız, 10s bekle..." && sleep 10)
          done

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: footnotes-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
